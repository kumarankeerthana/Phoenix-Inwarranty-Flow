name : Postman Collection Workflow

on : 
  push :
    branches : [main]
  workflow_dispatch:
  schedule:
    - cron : 00 11 * * * #timezone: EST
    - cron : 00 23 * * * #timezone: est

jobs:
  run-postman-tests:
    runs-on: ubuntu-latest

    steps:
      - name: checkout the code
        uses: actions/checkout@v7.0.0

      - name: Install Node.js and npm
        uses: actions/setup-node@v6.4.0
        with: 
          node-version: '24'

      - name: Install newman and Html extra globally
        run: |
             npm install -g newman 
             npm install -g newman-reporter-htmlextra

      - name: Run postman collection with newman
        run: |
             newman run 'Inwarranty-flow-Collection API Req.postman_collection.json' \
             -e QA.postman_environment.json \
             -d testdata.csv \
             -r cli,htmlextra


      - name: Newman Report
        if: always() #ensures that the archive section is executed irrespective of previous steps.
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Newman Report
          path: newman/*.html

      


    
